<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | SmartRetail</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="navbar"><h2>🛒 SmartRetail</h2><div class="nav-links"><a href="index.html">Home</a><a href="signup.html">Signup</a></div></div>
  </header>

  <div class="container">
    <div class="form-box">
      <h2 style="text-align:center; margin-bottom:20px;">Welcome Back</h2>
      <p id="msg" class="message"></p>
      <form onsubmit="handleLogin(event)">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button type="submit">Login</button>
      </form>
      <p style="text-align:center; margin-top:15px;">New user? <a href="signup.html">Register here</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
