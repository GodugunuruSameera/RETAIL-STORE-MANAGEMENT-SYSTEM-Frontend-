<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup | SmartRetail</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="navbar"><h2>🛒 SmartRetail</h2><div class="nav-links"><a href="index.html">Home</a><a href="login.html">Login</a></div></div>
  </header>

  <div class="container">
    <div class="form-box">
      <h2 style="text-align:center; margin-bottom:20px;">Create Account</h2>
      <p id="msg" class="message"></p>
      <form onsubmit="handleSignup(event)">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <button type="submit">Sign Up</button>
      </form>
      <p style="text-align:center; margin-top:15px;">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
